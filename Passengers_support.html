<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supporto - Passengers</title>
  <meta name="description" content="Pagina di supporto ufficiale per l'app Passengers" />
  <style>
    :root {
      --bg: #0b0b0d;
      --card: #141419;
      --text: #f2f2f4;
      --muted: #b7b7c2;
      --accent: #4da3ff;
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 30% 10%, rgba(77,163,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(130,87,229,.14), transparent 55%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 720px;
    }
    .card {
      background: rgba(20,20,25,.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: .2px;
    }
    p {
      margin: 10px 0;
      line-height: 1.55;
      color: var(--muted);
      font-size: 16px;
    }
    .email {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      text-decoration: none;
      transition: transform .08s ease, border-color .2s ease, background .2s ease;
    }
    .email:hover {
      transform: translateY(-1px);
      border-color: rgba(77,163,255,.55);
      background: rgba(77,163,255,.08);
    }
    .email small {
      color: var(--muted);
      display: block;
      margin-top: 2px;
    }
    footer {
      margin-top: 14px;
      text-align: center;
      color: rgba(255,255,255,.45);
      font-size: 12px;
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.75);
      margin-bottom: 14px;
    }
    .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card" aria-label="Supporto Passengers">
      <div class="badge">Passengers • Supporto</div>
      <h1>Hai bisogno di aiuto?</h1>

      <p>
        Per qualsiasi richiesta di supporto inerente l’applicazione <strong>Passengers</strong> o per domande di chiarimento,
        puoi contattarci via email.
      </p>

      <a class="email"
         href="mailto:lelio.monaco@gmail.com?subject=Supporto%Passengers"
         aria-label="Scrivi a lelio.monaco@gmail.com">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="1.6" />
          <path d="M4.5 7l7.5 6 7.5-6" stroke="currentColor" stroke-width="1.6" />
        </svg>
        <span>
          <strong>lelio.monaco@gmail.com</strong>
          <small>Rispondiamo il prima possibile</small>
        </span>
      </a>

    
    </section>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
